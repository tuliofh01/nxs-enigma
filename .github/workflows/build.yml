name: Build Executables

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NUITKA_VERSION: 'stable'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: enigma-linux-x86_64
            output_name: enigma.bin
          - os: macos-latest
            platform: macos
            artifact_name: enigma-macos
            output_name: enigma.bin
          - os: windows-latest
            platform: windows
            artifact_name: enigma-windows
            output_name: enigma.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Nuitka
        run: |
          pip install nuitka==${{ env.NUITKA_VERSION }} ordered-set zstandard

      - name: Install cross-compilation dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc mingw64 g++-mingw-w64

      - name: Build with Nuitka
        run: |
          python scripts/build.py --target ${{ matrix.platform }}

      - name: Prepare artifact
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          if [ "${{ matrix.platform }}" == "windows" ]; then
            cp builds/latest/enigma.exe dist/${{ matrix.artifact_name }}/
          else
            cp builds/latest/enigma.bin dist/${{ matrix.artifact_name }}/
            chmod +x dist/${{ matrix.artifact_name }}/enigma.bin
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          include-hidden-files: true

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/enigma-linux-x86_64/*
            dist/enigma-macos/*
            dist/enigma-windows/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-dev:
    name: Dev Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka==${{ env.NUITKA_VERSION }}

      - name: Build
        run: |
          python scripts/build.py --target ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ matrix.platform }}
          path: builds/latest/*
          if-no-files-found: warn
